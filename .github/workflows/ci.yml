name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sim-engine-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run simulation-engine tests
        working-directory: sim-engine
        run: pytest -q
