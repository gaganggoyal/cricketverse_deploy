services:

  sim-engine:
    build:
      context: ./sim-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./sim-engine:/app
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload --ws websockets
    restart: unless-stopped
    healthcheck:
      # the python:slim base image has no curl — probe with the stdlib
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=4)"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy

  multiplayer:
    build:
      context: ./sim-engine
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - ./sim-engine:/app
    command: uvicorn multiplayer.server:app --host 0.0.0.0 --port 8001 --reload --ws websockets
    restart: unless-stopped
    depends_on:
      - sim-engine

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_SIM_URL: "http://localhost:8000"
      NEXT_PUBLIC_MP_URL:  "ws://localhost:8001"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    restart: unless-stopped
    depends_on:
      - sim-engine

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - sim-engine
      - multiplayer
    restart: unless-stopped
    profiles:
      - production
