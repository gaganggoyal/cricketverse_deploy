# nginx.conf — CricketVerse production reverse proxy
# Handles WebSocket upgrade for real-time match streaming

upstream sim_engine {
    server sim-engine:8000;
    keepalive 32;
}

upstream multiplayer {
    server multiplayer:8001;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone  $binary_remote_addr zone=api:10m      rate=30r/m;
limit_req_zone  $binary_remote_addr zone=auth:10m     rate=10r/m;
limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

server {
    listen 80;
    server_name cricketverse.app www.cricketverse.app;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cricketverse.app www.cricketverse.app;

    ssl_certificate     /etc/ssl/certs/cricketverse.crt;
    ssl_certificate_key /etc/ssl/private/cricketverse.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ── Sim engine REST ────────────────────────────────────────
    location /api/sim/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://sim_engine/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── Sim engine WebSocket (live match) ──────────────────────
    location /ws/match/ {
        limit_conn ws_conn 5;
        proxy_pass          http://sim_engine/match/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Multiplayer WebSocket ──────────────────────────────────
    location /ws/room/ {
        limit_conn ws_conn 3;
        proxy_pass          http://multiplayer/room/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  7200s;
        proxy_send_timeout  7200s;
    }

    # ── Multiplayer REST ───────────────────────────────────────
    location /api/mp/ {
        proxy_pass       http://multiplayer/;
        proxy_set_header Host $host;
    }

    # ── Stripe webhook (no rate limit — Stripe IPs only) ──────
    location /api/stripe/webhook {
        proxy_pass       http://frontend/api/stripe/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Frontend (Next.js) ─────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass   http://frontend;
        expires      1y;
        add_header   Cache-Control "public, immutable";
    }

    # GLB models — cache 1 week
    location /models/ {
        root         /var/www/cricketverse;
        expires      7d;
        add_header   Cache-Control "public";
        add_header   Access-Control-Allow-Origin "*";
    }
}
