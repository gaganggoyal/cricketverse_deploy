# railway.toml — Deploy CricketVerse to Railway
# https://railway.app

[build]
builder = "NIXPACKS"

[[services]]
name = "sim-engine"
source = "sim-engine"
[services.build]
buildCommand = "pip install -r requirements.txt"
[services.deploy]
startCommand  = "uvicorn server:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
[services.variables]
PORT              = "8000"
ANTHROPIC_API_KEY = { sync = false }
CRICAPI_KEY       = { sync = false }
NEXT_PUBLIC_SUPABASE_URL = { sync = false }
SUPABASE_SERVICE_KEY     = { sync = false }

[[services]]
name = "multiplayer"
source = "sim-engine/multiplayer"
[services.build]
buildCommand = "pip install -r ../requirements.txt"
[services.deploy]
startCommand  = "uvicorn server:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
[services.variables]
PORT = "8001"

[[services]]
name = "redis"
image = "redis:7-alpine"
[services.deploy]
startCommand = "redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru"
